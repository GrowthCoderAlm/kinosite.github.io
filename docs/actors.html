<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/styles_actors.css">
    <link rel="stylesheet" href="../css/media.css">
    <title>Your favorite actors</title>
</head>
<body>

    <div class="header-placeholder"></div>

    <main class="main">
        <aside class="choosen_actor">
            <div class="actor_main_info">
                <div class="actor-card-poster">
                    <img class="actor-card-poster" src="" alt="Нет ручек - нет постера >:)">
                </div>
                <ul class="actor_main_info-texts">
                    <li class="actor-card-name">Уильям Афтон</li>
                    <li class="actor-card-prof">Режиссёр</li>
                </ul>
            </div>
            <div class="actor-films-history">
                <h5 class="films-history-count">10 Фильмов</h5>
                <a class="films-history-link" href="#">Фильм крутой да</a>
                <a class="films-history-link" href="#">Другой фильм хороший</a>
            </div>
        </aside>
        <div class="actor_list-wrapper">
            <div class="actors_list">
            <button class="actor-card">
                <div class="actor-card-poster">
                    <img class="actor-card-poster" src="" alt="Нет ручек - нет постера >:)">
                </div>
                <p class="actor-card-name">Уильям Афтон</p>
                <p class="actor-card-prof">Режиссёр</p>
            </button>
            
            
            </div>
            <div class="paginator">
                    <button class="paginator_button arrow arrow_disabled" id="btn_paginator-prev">←</button>
                    <button class="paginator_button pag_num cur_page" id="btn_paginator-0">1</button>
                    <button class="paginator_button pag_num" id="btn_paginator-1">2</button>
                    <button class="paginator_button pag_num" id="btn_paginator-2">3</button>
                    <button class="paginator_button pag_num" id="btn_paginator-3">4</button>
                    <button class="paginator_button pag_num" id="btn_paginator-4">5</button>
                    <button class="paginator_button arrow" id="btn_paginator-next">→</button>
            </div>
        </div>
        

    </main>

    <div class="footer-placeholder"></div>

    <script src="../js/load_blocks.js"></script>

    <script src="../js/script_actors.js"></script>
</body>
</html>
